  .nav-num { font-family: 'Courier Prime', monospace; font-size: 11px; color: #4a5a80; min-width: 22px; }
  .nav-item.active .nav-num { color: #d4a843; }
  .nav-label { font-size: 14px; font-family: 'Courier Prime', monospace; text-transform: uppercase; color: #b0c0e0; flex: 1; }
  .nav-item.active .nav-label { color: #fff; }
  .nav-check { color: #d4a843; }
  .nav-active-badge { color: #d4a843; font-size: 10px; font-family: 'Courier Prime', monospace; }

  /* API KEY SCREEN */
  .key-screen { min-height: 100vh; max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 20px; }
  .key-card { width: 100%; background: #252b3d; border: 1px solid rgba(212,168,67,0.3); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .key-card-title { font-family: 'Courier Prime', monospace; font-size: 13px; color: #ffffff; letter-spacing: 1px; }
  .key-card-desc { font-size: 13px; color: #8090b0; line-height: 1.6; }

  .spin { display: inline-block; animation: spin 1s linear infinite; }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .gap { display: flex; flex-direction: column; gap: 20px; }
  .gap-sm { display: flex; flex-direction: column; gap: 12px; }

  .print-cover { text-align: center; padding: 60px 40px 40px; border-bottom: 3px solid #b8862a; page-break-after: always; }

  .print-cover-domain { font-family: 'Courier Prime', monospace; font-size: 13px; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-top: 30px; }

</style>

<script defer>
const STAGES = [
  { id:"input",          label:"01", title:"Policy Input",         icon:"🖖" },

};

  "Taxation","Healthcare","Education","Criminal Justice",
  "Immigration","Housing & Planning","Business Regulation",
  "Welfare & Benefits","Defence & Security","Energy & Environment",
  "Transport","Trade & Economy","Social Policy",

const QUOTES = [
  // Spock
  { text:"Logic is the beginning of wisdom, not the end.", attr:"SPOCK" },
  { text:"Insufficient facts always invite danger.", attr:"SPOCK" },
  { text:"The needs of the many outweigh the needs of the few.", attr:"SPOCK" },

  { text:"I have never understood the female capacity to avoid a direct answer to any question.", attr:"SPOCK" },
  { text:"Nowhere am I so desperately needed as among a shipload of illogical humans.", attr:"SPOCK" },
  { text:"Without followers, evil cannot spread.", attr:"SPOCK" },
  { text:"Change is the essential process of all existence.", attr:"SPOCK" },
  // Milton Friedman
  { text:"You get what you incentivise.", attr:"ECONOMIC LAW" },
  { text:"If you put the federal government in charge of the Sahara Desert, in 5 years there'd be a shortage of sand.", attr:"MILTON FRIEDMAN" },
  { text:"One of the great mistakes is to judge policies and programs by their intentions rather than their results.", attr:"MILTON FRIEDMAN" },
  { text:"The government solution to a problem is usually as bad as the problem.", attr:"MILTON FRIEDMAN" },
  { text:"Nothing is so permanent as a temporary government program.", attr:"MILTON FRIEDMAN" },
  { text:"A society that puts equality before freedom will get neither. A society that puts freedom before equality will get a high degree of both.", attr:"MILTON FRIEDMAN" },
  { text:"There is no such thing as a free lunch.", attr:"MILTON FRIEDMAN" },
  { text:"The most important single central fact about a free market is that no exchange takes place unless both parties benefit.", attr:"MILTON FRIEDMAN" },
  { text:"Concentrated power is not rendered harmless by the good intentions of those who create it.", attr:"MILTON FRIEDMAN" },
  { text:"History suggests that capitalism is a necessary condition for political freedom.", attr:"MILTON FRIEDMAN" },
  // Hayek
  { text:"The curious task of economics is to demonstrate to men how little they really know about what they imagine they can design.", attr:"F.A. HAYEK" },
  { text:"The more the state plans, the more difficult planning becomes for the individual.", attr:"F.A. HAYEK" },
  { text:"There is all the difference in the world between treating people equally and attempting to make them equal.", attr:"F.A. HAYEK" },
  { text:"Knowledge is never centralised in a single mind.", attr:"F.A. HAYEK" },

  { text:"The state is the great fiction by which everybody tries to live at the expense of everybody else.", attr:"FRÉDÉRIC BASTIAT" },
  { text:"When plunder becomes a way of life, men create for themselves a legal system that authorises it.", attr:"FRÉDÉRIC BASTIAT" },
  { text:"Government is the great fiction through which everybody endeavors to live at the expense of everybody else.", attr:"FRÉDÉRIC BASTIAT" },

function extractScore(text) {
  // Look for patterns like "Score: 4", "6/10", "score of 7", "3 out of 10"
  const patterns = [
    /score[:\s]+(\d+)/i,
    /(\d+)\s*\/\s*10/i,
    /score\s+of\s+(\d+)/i,
    /(\d+)\s+out\s+of\s+10/i,
    /alignment[:\s]+(\d+)/i,
    /rating[:\s]+(\d+)/i,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) {
      const n = parseInt(m[1]);
      if (n >= 1 && n <= 10) return n;
    }
  }
  return null;
}

// ── API CALL ──────────────────────────────────────────────────────────────────
async function callClaude(userPrompt, systemPrompt) {
  const response = await fetch("/api/proxy", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role:"user", content: userPrompt }],
    }),
  });

  const data = await response.json();
  if (data.error) throw new Error(`${data.error.type}: ${data.error.message}`);
  if (data.content?.[0]?.text) return data.content[0].text;
  throw new Error("No text in response: " + JSON.stringify(data).slice(0,200));
}

// ── STAGE RUNNER ──────────────────────────────────────────────────────────────
async function runStage(stageId, userPrompt, sysPrompt, extraCompleted = []) {
  if (loading) return;
  loading = true;
  renderContent();
  try {
    const result = await callClaude(userPrompt, sysPrompt);
    results[stageId] = result;
    // Extract score from incentive analysis, then fetch suggestions
    if (stageId === "incentive") {
      const s = extractScore(result);
      incentiveScore = s !== null ? s : 5;
      suggestions = null;
      suggestionLoading = true;
      completedStages = [...new Set([...completedStages, ...extraCompleted, stageId])];
      currentStage = stageId;
      loading = false;
      showRestartBtn();
      renderStage();
      document.getElementById("top").scrollIntoView({ behavior:"smooth" });
      await doSuggestions();
      return;
    }
    completedStages = [...new Set([...completedStages, ...extraCompleted, stageId])];
    currentStage = stageId;
    showRestartBtn();
    renderStage();
    document.getElementById("top").scrollIntoView({ behavior:"smooth" });
  } catch(e) {
    loading = false;
    showError(e.message);
    renderContent();
  }
}

let suggestions = null;
let suggestionLoading = false;

async function doSuggestions() {
  suggestionLoading = true;
  renderContent();
  try {
    const belowThreshold = incentiveScore < 5;
    const prompt = `ORIGINAL POLICY: ${policyIdea}
DOMAIN: ${domain}
INCENTIVE ANALYSIS: ${results.incentive}
INCENTIVE SCORE: ${incentiveScore}/10

${belowThreshold
  ? `The policy scored ${incentiveScore}/10 — below the 5/10 threshold needed to proceed. Suggest 3 specific amendments to the policy wording that would fix the core incentive problems identified and get it above the threshold. Each amendment must stay true to the original spirit and intent of the policy.`
  : `The policy scored ${incentiveScore}/10 — it passes the threshold but could be stronger. Suggest 3 specific amendments to the policy wording that would improve the incentive alignment further, staying within the spirit of the original idea.`
}

For each suggestion provide:
AMENDMENT [N]
A single sentence describing the specific change to make to the policy.

REASON
One sentence explaining exactly which incentive problem this fixes and why it improves the score.

REVISED WORDING
The amended policy proposition as it would read after this change is applied (full restatement, not a fragment).

Keep each amendment focused and actionable. Do not number sections beyond the three amendments. Plain text only, no markdown.`;

    const result = await callClaude(prompt,
      `You are a policy amendment specialist. Suggest precise, targeted improvements to fix incentive problems. Stay within the original intent. Plain text only, use the exact headers specified. Each amendment must be brief — the entire response under 600 words total. A policy scoring 5 or above is workable — amendments should strengthen it, not overhaul it. Only policies scoring 4 or below need fundamental rethinking.`
    );
    suggestions = result;
  } catch(e) {
    suggestions = null;
  }
  suggestionLoading = false;
  renderContent();
}

function applyAmendment(n) {
  // Find the REVISED WORDING for amendment n and apply it to policyIdea
  if (!suggestions) return;
  const blocks = suggestions.split(/AMENDMENT\s+\d+/i).filter(b => b.trim());
  const block = blocks[n - 1];
  if (!block) return;
  const match = block.match(/REVISED WORDING\s*\n([\s\S]+?)(?=AMENDMENT|\Z|$)/i);
  if (match) {
    const revised = match[1].trim();
    if (revised) {
      policyIdea = revised;
      // Reset and re-run from scratch with new policy
      results = {}; completedStages = []; incentiveScore = 0; suggestions = null; streamedStages.clear();
      currentStage = "input";
      renderStage();
      // Auto-submit
      setTimeout(() => doIncentive(), 300);
    }
  }
}

  quoteRotatorInterval = setInterval(() => {
    currentQuoteIdx = (currentQuoteIdx + 1) % QUOTES.length;
    const qt = document.getElementById("rotating-quote-text");
    const qa = document.getElementById("rotating-quote-attr");
    if (qt && qa) {
      qt.style.opacity = "0";
      qa.style.opacity = "0";
      setTimeout(() => {
        qt.textContent = '"' + QUOTES[currentQuoteIdx].text + '"';
        qa.textContent = "— " + QUOTES[currentQuoteIdx].attr;
        qt.style.opacity = "1";
        qa.style.opacity = "1";
      }, 400);
    }
  }, 7000);
}

function stopQuoteRotator() {
  if (quoteRotatorInterval) { clearInterval(quoteRotatorInterval); quoteRotatorInterval = null; }
}

// Track which stage results have already been streamed so we don't re-stream on re-render
const streamedStages = new Set();
let activeStreamInterval = null;

function streamText(text, el, stageKey) {
  if (!el) return;
  // If already streamed this stage result, just display it instantly
  if (stageKey && streamedStages.has(stageKey)) {
    el.textContent = text;
    return;
  }
  // Cancel any existing stream
  if (activeStreamInterval) { clearInterval(activeStreamInterval); activeStreamInterval = null; }
  let i = 0;
  el.textContent = "";
  activeStreamInterval = setInterval(() => {
    if (!el.isConnected) { clearInterval(activeStreamInterval); return; }
    if (i < text.length) { el.textContent = text.slice(0, ++i); }
    else {
      clearInterval(activeStreamInterval);
      activeStreamInterval = null;
      // Only mark as streamed after it actually completes
      if (stageKey) streamedStages.add(stageKey);
    }
  }, 5);
}

function showError(msg) {
  const box = document.getElementById("error-box");
  if (box) box.innerHTML = `<div class="error-box">⚠ ${msg}</div>`;
}

function selectDomain(d) {
  domain = d;
  renderContent();
}

function submitPolicy() {
  policyIdea = document.getElementById("policy-input")?.value.trim() || policyIdea;
  if (!policyIdea || !domain) return;
  stopQuoteRotator();
  doIncentive();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function renderNav() {
  const wrap = document.getElementById("nav-items");
  const blockedStages = (incentiveScore > 0 && incentiveScore < 5)
    ? ["refinement","implementation","monitoring"]
    : [];
  wrap.innerHTML = STAGES.map(stage => {
    const active = currentStage === stage.id;
    const complete = completedStages.includes(stage.id);
    const blocked = blockedStages.includes(stage.id);
    const accessible = !blocked && (complete || stage.id === "input");
    return `<div class="nav-item ${active?'active':''} ${complete&&!active&&!blocked?'complete':''} ${(!accessible||blocked)?'locked':''}"
      onclick="${accessible?`goToStage('${stage.id}')`:''}" >
      <span class="nav-num">${stage.label}</span>
      <span style="font-size:17px">${stage.icon}</span>
      <span class="nav-label">${stage.title}</span>
      ${blocked ? '<span style="color:#ff6060;font-size:11px;font-family:\'Courier Prime\',monospace">BLOCKED</span>' : ''}
      ${complete&&!active&&!blocked ? '<span class="nav-check">✓</span>' : ''}
      ${active ? '<span class="nav-active-badge">ACTIVE</span>' : ''}
    </div>`;
  }).join("");
  document.getElementById("reset-btn").style.display = completedStages.length > 0 ? "block" : "none";
}

function goToStage(id) {
  if (completedStages.includes(id) || id === "input") {
    currentStage = id;
    closeNav();
    renderStage();
  }
}

function toggleNav() {
  document.getElementById("overlay").classList.toggle("open");
  document.getElementById("nav-drawer").classList.toggle("open");
  renderNav();
}
function closeNav() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("nav-drawer").classList.remove("open");
}

// ── PRINT PDF ─────────────────────────────────────────────────────────────────
function printPDF() {
  const stageInfo = {
    input:          { label:"01", title:"Policy Input",         icon:"🖖" },
    incentive:      { label:"02", title:"Incentive Analysis",   icon:"🎯" },
    consequences:   { label:"03", title:"Consequences Audit",   icon:"🔍" },
    refinement:     { label:"04", title:"Policy Refinement",    icon:"⚙️"  },
    implementation: { label:"05", title:"Implementation Plan",  icon:"📋" },
    monitoring:     { label:"06", title:"Monitoring Framework", icon:"📊" },
  };

  const stageOrder = ["incentive","consequences","refinement","implementation","monitoring"];
  const completed = stageOrder.filter(s => results[s]);
  if (completed.length === 0) { alert("Nothing to print yet — run at least one stage first."); return; }

  const scoreTooLow = incentiveScore > 0 && incentiveScore < 5;
  const dateStr = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  let html = `<div class="print-cover">
    <div class="print-cover-logo">🖖 SPOCK</div>
    <div class="print-cover-sub">Policy Logic Engine</div>
    <div class="print-cover-domain">${domain.toUpperCase()}</div>
    <div class="print-cover-policy">"${policyIdea}"</div>
    ${incentiveScore > 0 ? `<div class="print-score-badge">INCENTIVE SCORE: ${incentiveScore}/10</div>` : ""}
    <div class="print-cover-meta">Generated ${dateStr} &nbsp;|&nbsp; ${scoreTooLow ? "POLICY REJECTED — Sections 1–2 only" : `${completed.length} of 5 stages completed`}</div>
  </div>`;

  completed.forEach(stageId => {
    const info = stageInfo[stageId];
    html += `<div class="print-section">
      <div class="print-section-header">
        <span class="print-section-num">${info.label}</span>
        <span class="print-section-title">${info.title}</span>
      </div>
      <div class="print-rule"></div>
      <div class="print-body">${results[stageId].replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`;
  });

  if (scoreTooLow) {
    html += `<div class="print-rejected">
      <div class="print-rejected-title">🖖 Logic Verdict: Policy Rejected</div>
      <div class="print-rejected-body">Incentive alignment score of ${incentiveScore}/10 is below the minimum threshold of 5/10. This policy cannot proceed to refinement — it must be fundamentally redesigned from scratch.</div>
    </div>`;
  }

  document.getElementById("print-output").innerHTML = html;
  window.print();
  // Clean up after print dialog closes
  setTimeout(() => { document.getElementById("print-output").innerHTML = ""; }, 2000);
}

// Start the app once DOM is ready
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", showApp);
} else {
  showApp();
}
</script>

<div id="print-output"></div>
</body>
</html>
